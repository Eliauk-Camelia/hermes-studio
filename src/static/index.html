<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camelia Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep:    #161a18;
    --bg-surface: #1e2321;
    --bg-input:   #252b28;
    --text:       #e4e0dc;
    --text-dim:   #8b958b;
    --accent:     #e8927c;
    --accent-dim: #b87060;
    --sage:       #8b9d83;
    --sage-dim:   #5a6b55;
    --border:     #2a302d;
    --tool-bg:    #1c2320;
    --tool-border:#2d3830;
    --shadow:     0 2px 12px rgba(0,0,0,0.3);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Noto Serif SC', serif;
    background: var(--bg-deep);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── 背景纹理 ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 85% 20%, rgba(232,146,124,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 15% 80%, rgba(139,157,131,0.03) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── 头部 ── */
  #header {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-surface);
    flex-shrink: 0;
  }

  #header .logo {
    width: 32px;
    height: 32px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent-dim));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  #header h1 {
    font-size: 1.05rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: var(--text);
  }

  #header .badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-dim);
    background: var(--bg-input);
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 0.04em;
  }

  /* ── 聊天区域 ── */
  #chat {
    position: relative;
    z-index: 1;
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    scroll-behavior: smooth;
  }

  /* 淡入动画 */
  .msg {
    max-width: 78%;
    padding: 10px 16px;
    border-radius: 16px;
    line-height: 1.65;
    font-size: 0.92rem;
    animation: fadeIn 0.3s ease-out;
    word-break: break-word;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user {
    align-self: flex-end;
    background: linear-gradient(135deg, var(--accent-dim), #c06050);
    color: #fff;
    border-bottom-right-radius: 6px;
  }

  .msg.assistant {
    align-self: flex-start;
    background: var(--bg-surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-bottom-left-radius: 6px;
  }

  .msg.tool-info {
    align-self: flex-start;
    background: var(--tool-bg);
    color: var(--text-dim);
    border: 1px solid var(--tool-border);
    border-radius: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    padding: 8px 14px;
    max-width: 70%;
  }

  .msg.tool-info .icon {
    display: inline-block;
    margin-right: 6px;
  }

  /* ── 输入区 ── */
  #input-area {
    position: relative;
    z-index: 1;
    padding: 14px 24px 18px;
    background: var(--bg-surface);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    flex-shrink: 0;
  }

  #input {
    flex: 1;
    padding: 12px 18px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    font-family: 'Noto Serif SC', serif;
    font-size: 0.9rem;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    max-height: 120px;
  }

  #input:focus {
    border-color: var(--accent-dim);
  }

  #input::placeholder {
    color: var(--text-dim);
    opacity: 0.5;
  }

  #send {
    padding: 12px 22px;
    background: linear-gradient(135deg, var(--accent), var(--accent-dim));
    color: #fff;
    border: none;
    border-radius: 14px;
    font-family: 'Noto Serif SC', serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    flex-shrink: 0;
  }

  #send:hover {
    opacity: 0.9;
  }

  #send:active {
    transform: scale(0.96);
  }

  /* ── 滚动条 ── */
  #chat::-webkit-scrollbar {
    width: 5px;
  }
  #chat::-webkit-scrollbar-track {
    background: transparent;
  }
  #chat::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 10px;
  }
</style>
</head>
<body>

<div id="header">
  <div class="logo">&#x1f338;</div>
  <h1>Camelia Studio</h1>
  <span class="badge">v0.0.3-dev</span>
</div>

<div id="chat"></div>

<div id="input-area">
  <textarea id="input" rows="1" placeholder="输入消息，Enter 发送..." onkeydown="onKey(event)"></textarea>
  <button id="send" onclick="send()">发送</button>
</div>

<script>
const ws = new WebSocket("ws://" + location.host + "/ws");
const chat = document.getElementById("chat");
const input = document.getElementById("input");

function addMsg(role, text) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

ws.onmessage = e => {
  const event = JSON.parse(e.data);
  if (event.type === "tool_start") {
    addMsg("tool-info", "🔧 正在调用 " + event.name + "...");
  } else if (event.type === "tool_end") {
    const preview = (event.result || "").slice(0, 80);
    addMsg("tool-info", "✅ " + event.name + " → " + preview);
  } else if (event.type === "text") {
    addMsg("assistant", event.content);
  }
};

function send() {
  const text = input.value.trim();
  if (!text) return;
  addMsg("user", text);
  ws.send(JSON.stringify({ content: text }));
  input.value = "";
  input.style.height = "auto";
  chat.scrollTop = chat.scrollHeight;
}

function onKey(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
}
</script>

</body>
</html>
